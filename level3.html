<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3단계 미션</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        button { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-draw-3 { background: #008CBA; color: white; }
        .btn-success-3 { background: #4CAF50; color: white; }
        .btn-success-3:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; }
        #timer-3 { font-size: 45px; font-weight: bold; color: #333; margin: 20px 0; }
        #res-3 { color: #9b59b6; margin-top: 20px; font-size: 28px; min-height: 40px; }
    </style>
</head>
<body>
    <h1>3단계: 대상 + 사물 + 동작</h1>
    <div>
        <button class="btn-draw-3" onclick="drawLevel3()">3단계 동작 뽑기</button>
        <button class="btn-success-3" id="btn-success-3" onclick="stopTimerLevel3()" disabled>정답!</button>
    </div>
    
    <div id="timer-3">0.00초</div>
    <h2 id="res-3"></h2>
    
    <br><a href="index.html" class="btn-back">← 난이도 선택으로 돌아가기</a>

    <script>
        const subs3 = ["옆 사람에게", "앞 사람에게", "교수님(선생님)을 향해", "칠판을 향해", "창문 밖을 향해"];
        const objs3 = ["손가락 하트를", "보이지 않는 공을", "가벼운 윙크를", "소리 없는 따봉을", "메모지를"];
        const verbs3 = ["날리기", "보여주기", "조용히 시전하기", "은밀하게 건네기"];
        let timerInterval3 = null;
        let startTime3 = 0;

        function drawLevel3() {
            const s = subs3[Math.floor(Math.random() * subs3.length)];
            const o = objs3[Math.floor(Math.random() * objs3.length)];
            const v = verbs3[Math.floor(Math.random() * verbs3.length)];
            document.getElementById('res-3').innerText = `${s} ${o} ${v}`;
            
            clearInterval(timerInterval3);
            document.getElementById('timer-3').style.color = "#333";
            document.getElementById('btn-success-3').disabled = false;
            
            startTime3 = Date.now();
            timerInterval3 = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime3) / 1000).toFixed(2);
                document.getElementById('timer-3').innerText = elapsedTime + "초";
            }, 10);
        }

        function stopTimerLevel3() {
            if (timerInterval3) {
                clearInterval(timerInterval3);
                timerInterval3 = null;
                document.getElementById('timer-3').style.color = "#2ecc71";
                document.getElementById('btn-success-3').disabled = true;
            }
        }
    </script>
</body>
</html>
