<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1단계 미션</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        button { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-draw-1 { background: #008CBA; color: white; }
        .btn-success-1 { background: #4CAF50; color: white; }
        .btn-success-1:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; }
        #timer-1 { font-size: 45px; font-weight: bold; color: #333; margin: 20px 0; }
        #res-1 { color: #e74c3c; margin-top: 20px; font-size: 28px; min-height: 40px; }
    </style>
</head>
<body>
    <h1>1단계: 혼자 하는 동작</h1>
    <div>
        <button class="btn-draw-1" onclick="drawLevel1()">1단계 동작 뽑기</button>
        <button class="btn-success-1" id="btn-success-1" onclick="stopTimerLevel1()" disabled>정답!</button>
    </div>
    
    <div id="timer-1">0.00초</div>
    <h2 id="res-1"></h2>
    
    <br><a href="index.html" class="btn-back">← 난이도 선택으로 돌아가기</a>

    <script>
        const missions1 = ["신발 조용히 벗기", "바닥에 눕기", "의자에서 기지개 켜기", "눈 감고 10초 명상하기", "허공에 주먹질하기", "소리 없이 박수 한 번 치기"];
        let timerInterval1 = null;
        let startTime1 = 0;

        function drawLevel1() {
            document.getElementById('res-1').innerText = missions1[Math.floor(Math.random() * missions1.length)];
            
            clearInterval(timerInterval1);
            document.getElementById('timer-1').style.color = "#333";
            document.getElementById('btn-success-1').disabled = false;
            
            startTime1 = Date.now();
            timerInterval1 = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime1) / 1000).toFixed(2);
                document.getElementById('timer-1').innerText = elapsedTime + "초";
            }, 10);
        }

        function stopTimerLevel1() {
            if (timerInterval1) {
                clearInterval(timerInterval1);
                timerInterval1 = null;
                document.getElementById('timer-1').style.color = "#2ecc71";
                document.getElementById('btn-success-1').disabled = true;
            }
        } 
    </script>
</body>
</html>
